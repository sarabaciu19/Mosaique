<nz-layout class="app-layout">
  <!-- Sidebar-ul din stânga -->
  <nz-sider nzCollapsible [(nzCollapsed)]="isCollapsed" [nzTrigger]="null" [nzWidth]="260" class="sidebar">
    <div class="sidebar-logo">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span *ngIf="!isCollapsed">Mosaique</span>
    </div>
    
    <ul nz-menu nzTheme="dark" nzMode="inline" [nzInlineCollapsed]="isCollapsed" class="sidebar-menu">
      <!-- Meniul 1: Divertisment -->
      <li nz-menu-item routerLink="/dashboard/entertainment" routerLinkActive="nz-menu-item-selected" class="menu-item">
        <span class="menu-icon-wrapper">
          <svg class="menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M7 2V22" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M17 2V22" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 12H22" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 7H7" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M2 17H7" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M17 17H22" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M17 7H22" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="menu-text">Entertainment</span>
      </li>

      <!-- Meniul 2: Fitness -->
      <li nz-menu-item routerLink="/dashboard/fitness" routerLinkActive="nz-menu-item-selected" class="menu-item">
        <span class="menu-icon-wrapper">
          <svg class="menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.5 6.5H17.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M18 4H20C21.1 4 22 4.9 22 6V18C22 19.1 21.1 20 20 20H18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M6 4H4C2.9 4 2 4.9 2 6V18C2 19.1 2.9 20 4 20H6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M6.5 17.5H17.5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            <rect x="9" y="3" width="6" height="18" rx="1" stroke="currentColor" stroke-width="2"/>
          </svg>
        </span>
        <span class="menu-text">Fitness Tracker</span>
      </li>

      <!-- Meniul 3: Management (Task-uri) -->
      <li nz-menu-item routerLink="/dashboard/management" routerLinkActive="nz-menu-item-selected" class="menu-item">
        <span class="menu-icon-wrapper">
          <svg class="menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 11L12 14L22 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M21 12V19C21 20.1 20.1 21 19 21H5C3.9 21 3 20.1 3 19V5C3 3.9 3.9 3 5 3H16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="menu-text">Management (Tasks)</span>
      </li>

      <!-- Meniul 4: Călătorii -->
      <li nz-menu-item routerLink="/dashboard/travel" routerLinkActive="nz-menu-item-selected" class="menu-item">
        <span class="menu-icon-wrapper">
          <svg class="menu-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="menu-text">Travel</span>
      </li>
    </ul>
  </nz-sider>

  <!-- Partea din dreapta: Header și Conținutul efectiv al paginii active -->
  <nz-layout class="main-layout">
    <!-- Header-ul paginii -->
    <nz-header class="app-header">
      <div class="header-left">
        <!-- Butonul de pliere Sidebar -->
        <span class="collapse-trigger" (click)="isCollapsed = !isCollapsed">
          <svg *ngIf="!isCollapsed" class="trigger-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
          <svg *ngIf="isCollapsed" class="trigger-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </span>
        <h2 class="header-title">Your Personal Planner</h2>
      </div>

      <!-- Zona de profil din dreapta header-ului -->
      <div class="header-right">
        <div class="user-profile">
          <nz-avatar nzSize="default" nzText="M" class="user-avatar"></nz-avatar>
          <span class="user-name">Mosaique Team</span>
        </div>
        <button nz-button nzType="text" class="logout-btn" (click)="logout()">
          <svg class="logout-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5C3.9 21 3 20.1 3 19V5C3 3.9 3.9 3 5 3H9" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          <span>Logout</span>
        </button>
      </div>
    </nz-header>

    <!-- Conținutul dinamic (rutele copil) -->
    <nz-content class="app-content">
      <div class="page-container animate-fade">
        <router-outlet></router-outlet>
      </div>
    </nz-content>
  </nz-layout>
</nz-layout>
