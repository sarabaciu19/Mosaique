<div class="page-panel">
  <div class="page-header">
    <div class="page-title">
      <h1>Travel</h1>
    </div>
    <div class="page-actions">
      <nz-input-group [nzSuffix]="suffixIconSearch" class="search-input">
        <input type="text" nz-input placeholder="Search city, country, objective..." [(ngModel)]="searchTerm"
          (ngModelChange)="onSearch()" />
      </nz-input-group>
      <ng-template #suffixIconSearch>
        <span nz-icon nzType="search"></span>
      </ng-template>
      <button nz-button nzType="primary" (click)="showModal()">
        <span nz-icon nzType="plus"></span> Add
      </button>
    </div>
  </div>
  <nz-table #basicTable [nzData]="filteredList()" [nzPageSize]="8" nzSize="middle">
    <thead>
      <tr>
        <th nzColumnKey="city" [nzSortFn]="sortCity">City</th>
        <th nzColumnKey="country" [nzSortFn]="sortCountry">Country</th>
        <th nzColumnKey="date" [nzSortFn]="sortDate">Visit Date</th>
        <th nzColumnKey="budget" [nzSortFn]="sortBudget">Budget Spent</th>
        <th nzColumnKey="mainObjective" [nzSortFn]="sortObj">Main Objective</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of basicTable.data">
        <td>
          <strong>{{ item.city }}</strong>
        </td>
        <td>
          <nz-tag nzColor="cyan">{{ item.country }}</nz-tag>
        </td>
        <td>{{ item.date | date:'dd MMM yyyy' }}</td>
        <td>
          <span class="budget-badge">{{ item.budget | currency:'USD':'symbol':'1.0-0' }}</span>
        </td>
        <td>{{ item.mainObjective }}</td>
        <td>
          <div class="action-btns">
            <button nz-button nzType="default" nzSize="small" (click)="edit(item)">
              <span nz-icon nzType="edit"></span>
            </button>
            <button nz-button nzType="default" nzSize="small" nzDanger (click)="delete(item.id)">
              <span nz-icon nzType="delete"></span>
            </button>
          </div>
        </td>
      </tr>
    </tbody>
  </nz-table>
</div>

<!-- Add / Edit Modal -->
<nz-modal [(nzVisible)]="isVisible" [nzTitle]="isEditing ? 'Edit Travel' : 'Add Travel'" (nzOnCancel)="handleCancel()"
  (nzOnOk)="handleOk()" nzOkText="Save">

  <ng-container *nzModalContent>
    <form nz-form [formGroup]="form" nzLayout="vertical">
      <div class="form-row">
        <nz-form-item class="flex-item">
          <nz-form-label nzRequired>City</nz-form-label>
          <nz-form-control nzErrorTip="Required field!">
            <input nz-input formControlName="city" placeholder="e.g. Paris" />
          </nz-form-control>
        </nz-form-item>

        <nz-form-item class="flex-item">
          <nz-form-label nzRequired>Country</nz-form-label>
          <nz-form-control nzErrorTip="Required field!">
            <input nz-input formControlName="country" placeholder="e.g. France" />
          </nz-form-control>
        </nz-form-item>
      </div>

      <div class="form-row">
        <nz-form-item class="flex-item">
          <nz-form-label nzRequired>Visit Date</nz-form-label>
          <nz-form-control nzErrorTip="Required field!">
            <nz-date-picker formControlName="date" style="width: 100%"></nz-date-picker>
          </nz-form-control>
        </nz-form-item>

        <nz-form-item class="flex-item">
          <nz-form-label nzRequired>Budget Spent ($)</nz-form-label>
          <nz-form-control nzErrorTip="Positive value required!">
            <input nz-input type="number" formControlName="budget" min="0" placeholder="0" />
          </nz-form-control>
        </nz-form-item>
      </div>

      <nz-form-item>
        <nz-form-label nzRequired>Main Objective Visited</nz-form-label>
        <nz-form-control nzErrorTip="Required field!">
          <input nz-input formControlName="mainObjective" placeholder="e.g. Eiffel Tower" />
        </nz-form-control>
      </nz-form-item>
    </form>
  </ng-container>
</nz-modal>
