<div class="page-panel">
    <div class="page-header">
        <div class="page-title">
            <h1>Travel</h1>
        </div>
        <div class="page-actions">
            <nz-input-group [nzSuffix]="suffixIconSearch" class="search-input">
                <input type="text" nz-input placeholder="Caută oraș, țară, obiectiv..." [(ngModel)]="searchTerm"
                    (ngModelChange)="onSearch()" />
            </nz-input-group>
            <ng-template #suffixIconSearch>
                <span nz-icon nzType="search"></span>
            </ng-template>
            <button nz-button nzType="primary" (click)="showModal()">
                <span nz-icon nzType="plus"></span> Adaugă
            </button>
        </div>
    </div>
    <nz-table #basicTable [nzData]="filteredList()" [nzPageSize]="8" nzSize="middle">
        <thead>
            <tr>
                <th nzColumnKey="city" [nzSortFn]="sortCity">Oraș</th>
                <th nzColumnKey="country" [nzSortFn]="sortCountry">Țară</th>
                <th nzColumnKey="date" [nzSortFn]="sortDate">Data vizitei</th>
                <th nzColumnKey="budget" [nzSortFn]="sortBudget">Buget cheltuit</th>
                <th nzColumnKey="mainObjective" [nzSortFn]="sortObj">Obiectiv principal</th>
                <th>Acțiuni</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let item of basicTable.data">
                <td>
                    <strong>{{ item.city }}</strong>
                </td>
                <td>
                    <nz-tag nzColor="cyan">{{ item.country }}</nz-tag>
                </td>
                <td>{{ item.date | date:'dd MMM yyyy' }}</td>
                <td>
                    <span class="budget-badge">{{ item.budget | currency:'USD':'symbol':'1.0-0' }}</span>
                </td>
                <td>{{ item.mainObjective }}</td>
                <td>
                    <div class="action-btns">
                        <button nz-button nzType="default" nzSize="small" (click)="edit(item)">
                            <span nz-icon nzType="edit"></span>
                        </button>
                        <button nz-button nzType="default" nzSize="small" nzDanger (click)="delete(item.id)">
                            <span nz-icon nzType="delete"></span>
                        </button>
                    </div>
                </td>
            </tr>
        </tbody>
    </nz-table>
</div>

<!-- Add / Edit Modal -->
<nz-modal [(nzVisible)]="isVisible" [nzTitle]="isEditing ? 'Editează călătorie' : 'Adaugă călătorie'"
    (nzOnCancel)="handleCancel()" (nzOnOk)="handleOk()" nzOkText="Salvează">

    <ng-container *nzModalContent>
        <form nz-form [formGroup]="form" nzLayout="vertical">
            <div class="form-row">
                <nz-form-item class="flex-item">
                    <nz-form-label nzRequired>Oraș</nz-form-label>
                    <nz-form-control nzErrorTip="Câmp obligatoriu!">
                        <input nz-input formControlName="city" placeholder="ex: Paris" />
                    </nz-form-control>
                </nz-form-item>

                <nz-form-item class="flex-item">
                    <nz-form-label nzRequired>Țară</nz-form-label>
                    <nz-form-control nzErrorTip="Câmp obligatoriu!">
                        <input nz-input formControlName="country" placeholder="ex: France" />
                    </nz-form-control>
                </nz-form-item>
            </div>

            <div class="form-row">
                <nz-form-item class="flex-item">
                    <nz-form-label nzRequired>Data vizitei</nz-form-label>
                    <nz-form-control nzErrorTip="Câmp obligatoriu!">
                        <nz-date-picker formControlName="date" style="width: 100%"></nz-date-picker>
                    </nz-form-control>
                </nz-form-item>

                <nz-form-item class="flex-item">
                    <nz-form-label nzRequired>Buget cheltuit ($)</nz-form-label>
                    <nz-form-control nzErrorTip="Valoare pozitivă!">
                        <input nz-input type="number" formControlName="budget" min="0" placeholder="0" />
                    </nz-form-control>
                </nz-form-item>
            </div>

            <nz-form-item>
                <nz-form-label nzRequired>Obiectiv principal vizitat</nz-form-label>
                <nz-form-control nzErrorTip="Câmp obligatoriu!">
                    <input nz-input formControlName="mainObjective" placeholder="ex: Eiffel Tower" />
                </nz-form-control>
            </nz-form-item>
        </form>
    </ng-container>
</nz-modal>
